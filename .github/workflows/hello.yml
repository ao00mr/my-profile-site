name: Hello World

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Hello World を表示
        run: echo "Hello, GitHub Actions!"

      - name: ブランチ名を表示
        run: echo "Branch: ${{ github.ref_name }}"
